<script>
    let selectedFiles = null;
    let file_layout = {};
    let paneStates = {};
    let activePaneId = null;
    let activeRowId = null;
    let paneCounter = 0;
    let rowCounter = 0;
    let currentFullscreenPaneId = null;
    let rootFolderTitle = "Sammie's Notebook";

    function displayMDContent(MD_String, paneId){
        document.getElementById('content_' + paneId).innerHTML =
            marked.parse(MD_String);
    };

    function setPageTitle(fileName = null, useRootTitle = false) {
        if (useRootTitle) {
            $("#pageTitle").text(rootFolderTitle || "Sammie's Notebook");
            return;
        }

        $("#pageTitle").text(fileName || rootFolderTitle || "Sammie's Notebook");
    }

    function setSidebarIcon(iconSrc = null) {
        const sidebarIconEl = document.getElementById("sidebarToggleIcon");
        if (!sidebarIconEl) { return; }

        if (!iconSrc) {
            sidebarIconEl.src = "Icon - v3.png";
            return;
        }

        sidebarIconEl.src = iconSrc;
    }

    function clearDynamicFavicons() {
        const headEl = document.head || document.getElementsByTagName("head")[0];
        if (!headEl) { return; }

        headEl.querySelectorAll('link[data-dynamic-favicon="true"]').forEach((el) => el.remove());
    }

    function appendDynamicFavicon(relValue, hrefValue, typeValue = "image/png", sizesValue = null) {
        const headEl = document.head || document.getElementsByTagName("head")[0];
        if (!headEl) { return; }

        const linkEl = document.createElement("link");
        linkEl.setAttribute("rel", relValue);
        linkEl.setAttribute("href", hrefValue);
        linkEl.setAttribute("data-dynamic-favicon", "true");
        if (typeValue) {
            linkEl.setAttribute("type", typeValue);
        }
        if (sizesValue) {
            linkEl.setAttribute("sizes", sizesValue);
        }
        headEl.appendChild(linkEl);
    }

    function setChromeFriendlyFavicon(iconSrc = null, mimeType = "image/png") {
        const baseFallback = "Icon - v3.png";
        const finalSrc = iconSrc || baseFallback;

        clearDynamicFavicons();

        const faviconEl = document.getElementById("pageFavicon");
        if (faviconEl) {
            faviconEl.setAttribute("href", finalSrc);
            faviconEl.setAttribute("type", mimeType || "image/png");
        }

        // Chrome is often happier if multiple favicon rel variants exist.
        appendDynamicFavicon("icon", finalSrc, mimeType);
        appendDynamicFavicon("shortcut icon", finalSrc, mimeType);
        appendDynamicFavicon("apple-touch-icon", finalSrc, mimeType, "180x180");

        // Force Chrome to notice the title/tab state changed.
        const currentTitle = document.title;
        document.title = currentTitle + " ";
        setTimeout(() => {
            document.title = currentTitle;
        }, 0);
    }

    function applyRootIconToSidebarAndFavicon(file) {
        if (!file || !file.name || !file.webkitRelativePath) { return; }

        const lowerName = file.name.toLowerCase();
        const supportedExtensions = [".png", ".jpg", ".jpeg", ".ico", ".webp", ".gif"];
        const matchedExtension = supportedExtensions.find((ext) => lowerName.endsWith(ext));

        if (!matchedExtension) { return; }

        const relativePath = String(file.webkitRelativePath).replace(/\\/g, "/");
        const pathParts = relativePath.split("/").filter(Boolean);

        if (pathParts.length !== 2) { return; } // only root-folder direct children

        const fileStem = lowerName.slice(0, -matchedExtension.length);
        if (fileStem !== "icon") { return; }

        const reader = new FileReader();
        reader.onload = (event) => {
            const dataUrl = event.target.result;
            const mimeType = file.type || (
                matchedExtension === ".ico" ? "image/x-icon" :
                matchedExtension === ".webp" ? "image/webp" :
                matchedExtension === ".gif" ? "image/gif" :
                matchedExtension === ".jpg" || matchedExtension === ".jpeg" ? "image/jpeg" :
                "image/png"
            );

            setSidebarIcon(dataUrl);
            setChromeFriendlyFavicon(dataUrl, mimeType);
        };
        reader.onerror = (error) => {
            console.error("Error reading root icon file:", error);
        };
        reader.readAsDataURL(file);
    }

    function maybeApplyRootSidebarIcon(file) {
        if (!file || !file.name || !file.webkitRelativePath) { return; }

        const lowerName = file.name.toLowerCase();
        const supportedExtensions = [".png", ".jpg", ".jpeg", ".ico", ".webp", ".gif"];
        const matchedExtension = supportedExtensions.find((ext) => lowerName.endsWith(ext));

        if (!matchedExtension) { return; }

        const relativePath = String(file.webkitRelativePath).replace(/\\/g, "/");
        const pathParts = relativePath.split("/").filter(Boolean);

        if (pathParts.length !== 2) { return; } // only root-folder direct children

        const fileStem = lowerName.slice(0, -matchedExtension.length);
        if (fileStem !== "icon") { return; }

        const reader = new FileReader();
        reader.onload = (event) => {
            setSidebarIcon(event.target.result);
        };
        reader.onerror = (error) => {
            console.error("Error reading root icon file:", error);
        };
        reader.readAsDataURL(file);
    }

    function attachPaneInteractions(paneId) {
        const contentEl = document.getElementById("content_" + paneId);
        let mouseDown = false;
        let startX, startY, scrollLeft, scrollTop;

        contentEl.addEventListener('mousedown', (e) => {
            const state = getPaneState(paneId);
            if (!state || !state.image_mode) { return; }

            mouseDown = true;
            startX = e.pageX - contentEl.offsetLeft;
            startY = e.pageY - contentEl.offsetTop;
            scrollLeft = contentEl.scrollLeft;
            scrollTop = contentEl.scrollTop;
            e.preventDefault();
        });

        contentEl.addEventListener('mouseup', () => {
            mouseDown = false;
        });

        contentEl.addEventListener('mouseleave', () => {
            mouseDown = false;
        });

        contentEl.addEventListener('mousemove', (e) => {
            const state = getPaneState(paneId);
            if (!state || !state.image_mode || !mouseDown) return;

            e.preventDefault();

            const x = e.pageX - contentEl.offsetLeft;
            const y = e.pageY - contentEl.offsetTop;

            const walkX = (x - startX);
            const walkY = (y - startY);

            contentEl.scrollLeft = scrollLeft - walkX;
            contentEl.scrollTop = scrollTop - walkY;
        });

        contentEl.addEventListener("wheel", function (e) {
            const state = getPaneState(paneId);
            if (!state || !state.image_mode) return;

            e.preventDefault();

            const direction = (e.deltaY > 0) ? -1 : 1;
            const step = 10;

            const sliderEl = $("#scale-slider_" + paneId);
            let current = parseInt(sliderEl.val(), 10);
            let next = current + (direction * step);

            const min = parseInt(sliderEl.attr("min"), 10);
            const max = parseInt(sliderEl.attr("max"), 10);

            if (next < min) next = min;
            if (next > max) next = max;

            sliderEl.val(next);
            sliderPane(paneId, 0);
        }, { passive: false });
    }

        const rowEl = $("#pane_" + paneId).closest(".pane-row");

        delete paneStates[paneId];
        $("#pane_" + paneId).remove();

        if (rowEl.length && rowEl.find(".viewer-pane").length === 0) {
            rowEl.remove();
        }

        const remainingPaneIds = getPaneIdsInOrder();
        const remainingRowIds = getRowIdsInOrder();

        if (remainingPaneIds.length === 0) {

            setActivePane(remainingPaneIds[0]);
        } else if (removedRowId && activeRowId === removedRowId && remainingRowIds.length > 0) {
            activeRowId = remainingRowIds[0];
        }

        updateCloseButtons();
        renderPaneMenu();
        recalculateCompactRowHeights();
        setTimeout(updateAllPaneImageScales, 0);
    }

        state.currentFile = file;
        $("#pane_title_" + paneId)

        if (lowerName.endsWith(".md")){
            const reader = new FileReader();

            reader.onload = (event) => {

                displayMDContent(markdownContent, paneId);

                setTimeout(layoutAllRows, 0);
            };

            reader.onerror = (error) => {
                console.error('Error reading the file:', error);
            };

            reader.readAsText(file, 'utf-8');
        } else if (lowerName.endsWith(".docx")) {
            const reader = new FileReader();

            reader.onload = async (event) => {
                const arrayBuffer = event.target.result;

                $("#editBtn_" + paneId).hide();
                $("#slider_div_" + paneId).hide();
                $("#content_" + paneId).removeClass("sidebar_toggle");
                setPaneModeClass(paneId, "docx-mode");

                $("#editor_" + paneId).hide();
                $("#content_" + paneId).show();
                $("#saveBtn_" + paneId).hide();
                $("#cancelBtn_" + paneId).hide();

                state.image_mode = false;
                state.markdownContent = "";
                markPaneKind(paneId, "docx");
                updatePaneFullscreenClass(paneId);

                const hostEl = document.getElementById("docx_host_" + paneId);
                if (!hostEl) { return; }

                try {
                    const docxRenderer = (window.docx && typeof window.docx.renderAsync === "function")
                        ? window.docx
                        : (window.docxPreview && typeof window.docxPreview.renderAsync === "function")
                            ? window.docxPreview
                            : null;

                    if (!docxRenderer) {
                        throw new Error("DOCX renderer library did not load.");
                    }

                    await docxRenderer.renderAsync(arrayBuffer, hostEl, null, {
                        inWrapper: true,
                        breakPages: true,
                        ignoreWidth: false,
                        ignoreHeight: false,
                        ignoreFonts: false,
                        renderHeaders: true,
                        renderFooters: true,
                        renderFootnotes: true,
                        renderEndnotes: true,
                        useBase64URL: true
                    });
                } catch (error) {
                    console.error("Error rendering DOCX:", error);
                    hostEl.innerHTML = `

                            <span style="color:var(--accent-primary);">${file.name}</span><br>

                                Check console for the specific DOCX error.

                renderPaneMenu();
                setTimeout(() => {
                    layoutAllRows();
                    scaleDocxToPane(paneId);

            };

            reader.onerror = (error) => {

            reader.readAsArrayBuffer(file);
        } else if (lowerName.endsWith(".png") || lowerName.endsWith(".jpg") || lowerName.endsWith(".jpeg")){

                state.markdownContent = "";
                markPaneKind(paneId, "image");

                setTimeout(layoutAllRows, 0);

            reader.onerror = (error) => {

        } else if (lowerName.endsWith(".mp3") || lowerName.endsWith(".wav") || lowerName.endsWith(".ogg")) {

    function recalculateCompactRowHeights() {
        if (!$("body").hasClass("compact-rows")) {
            document.body.style.removeProperty("--compact-pane-height");
            return;
        }

        const container = document.getElementById("pane_container");
        if (!container) { return; }

        const rows = container.querySelectorAll(".pane-row");
        const rowCount = Math.max(1, rows.length);

        const containerRect = container.getBoundingClientRect();
        const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 900;
        const rowStyles = window.getComputedStyle(container);
        const rowGap = parseFloat(rowStyles.gap || rowStyles.rowGap || 12) || 12;

        const samplePane = container.querySelector(".viewer-pane");
        let chromeHeight = 86;  // sane fallback
        if (samplePane) {
            const paneContent = samplePane.querySelector(".pane-content");
            if (paneContent) {
                const paneRect = samplePane.getBoundingClientRect();
                const contentRect = paneContent.getBoundingClientRect();
                chromeHeight = Math.max(0, paneRect.height - contentRect.height);
            }
        }

        const bottomPadding = $("body").hasClass("gui-hidden") ? 0 : 8;
        const availableHeight = Math.max(120, viewportHeight - containerRect.top - bottomPadding);
        const totalGapHeight = rowGap * Math.max(0, rowCount - 1);
        const perRowTotal = Math.max(140, Math.floor((availableHeight - totalGapHeight) / rowCount));
        const contentHeight = Math.max(90, perRowTotal - chromeHeight);

        document.body.style.setProperty("--compact-pane-height", contentHeight + "px");
        setTimeout(layoutAllRows, 0);
    }

    }

    function downloadString(text, fileName) {
        var blob = new Blob([text], { type: "text/plain" });

        var a = document.createElement('a');
        fileName = fileName + ".txt";
        a.download = fileName;
        a.href = URL.createObjectURL(blob);
        a.dataset.downloadurl = ["text/plain", a.download, a.href].join(':');
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(a.href); }, 1500);
    }

        if (!state) { return; }

        $("#content_" + paneId).show();
        $("#editor_" + paneId).hide();
        $("#editBtn_" + paneId).show();
        $("#saveBtn_" + paneId).hide();
        $("#cancelBtn_" + paneId).hide();

        $("#editor_" + paneId).val(state.markdownContent);
    }

    function cleanString(string) {
        return string.replaceAll(' ', '').replaceAll("'", '').replaceAll("#", '').replaceAll("&", '').replaceAll("!", '');
    }

    function idFromPath(pathKey) {
        return cleanString(pathKey.replaceAll("/", "__"));
    }

    function getPaneImageBaseFit(paneId) {
        const contentEl = document.getElementById("content_" + paneId);
        const imageEl = document.getElementById("image_display_" + paneId);

        if (!contentEl || !imageEl || !imageEl.naturalWidth || !imageEl.naturalHeight) {
            return null;
        }

        const contentStyles = window.getComputedStyle(contentEl);
        const paddingX = parseFloat(contentStyles.paddingLeft || 0) + parseFloat(contentStyles.paddingRight || 0);
        const paddingY = parseFloat(contentStyles.paddingTop || 0) + parseFloat(contentStyles.paddingBottom || 0);

        const contentWidth = Math.max(1, contentEl.clientWidth - paddingX);
        const contentHeight = Math.max(1, contentEl.clientHeight - paddingY);
        if (!contentWidth || !contentHeight) { return null; }

        const widthFromHeight = imageEl.naturalWidth * (contentHeight / imageEl.naturalHeight);

        if (widthFromHeight <= contentWidth) {
            return {
                width: widthFromHeight,
                height: contentHeight,
                fitMode: "height",
                contentWidth,
                contentHeight
            };
        }

        const heightFromWidth = imageEl.naturalHeight * (contentWidth / imageEl.naturalWidth);
        return {
            width: contentWidth,
            height: heightFromWidth,
            fitMode: "width",
            contentWidth,
            contentHeight
        };
    }

    function getPaneChromeWidth(paneId) {
        const paneEl = document.getElementById("pane_" + paneId);
        const contentEl = document.getElementById("content_" + paneId);

        if (!paneEl || !contentEl) { return 0; }

        const paneStyles = window.getComputedStyle(paneEl);
        const contentStyles = window.getComputedStyle(contentEl);

        const paneHorizontal =
            parseFloat(paneStyles.paddingLeft || 0) +
            parseFloat(paneStyles.paddingRight || 0) +
            parseFloat(paneStyles.borderLeftWidth || 0) +
            parseFloat(paneStyles.borderRightWidth || 0);

        const contentHorizontal =
            parseFloat(contentStyles.paddingLeft || 0) +
            parseFloat(contentStyles.paddingRight || 0) +
            parseFloat(contentStyles.borderLeftWidth || 0) +
            parseFloat(contentStyles.borderRightWidth || 0);

        return paneHorizontal + contentHorizontal;
    }

    
    function scaleDocxToPane(paneId) {
        const state = getPaneState(paneId);
        if (!state || state.pane_kind !== "docx") { return; }

        const contentEl = document.getElementById("content_" + paneId);
        if (!contentEl) { return; }

        const pages = contentEl.querySelectorAll(".docx > section.docx-page");
        if (!pages.length) { return; }

        const contentStyles = window.getComputedStyle(contentEl);
        const paddingX = parseFloat(contentStyles.paddingLeft || 0) + parseFloat(contentStyles.paddingRight || 0);
        const availableWidth = Math.max(1, contentEl.clientWidth - paddingX);

        pages.forEach((pageEl) => {
            pageEl.style.transform = "";
            pageEl.style.width = "";
            pageEl.style.maxWidth = "none";

            const naturalWidth = pageEl.scrollWidth || pageEl.offsetWidth || 1;
            const scale = Math.min(1, availableWidth / naturalWidth);

            pageEl.style.transform = "scale(" + scale + ")";
            pageEl.style.width = naturalWidth + "px";
            pageEl.style.maxWidth = "none";
            pageEl.style.marginBottom = Math.max(24, Math.round((1 - scale) * 120) + 24) + "px";
        });
    }

    function scaleAllDocxPanes() {
        Object.keys(paneStates).forEach((paneId) => {
            scaleDocxToPane(paneId);
        });
    }

function getIdealPaneWidth(paneId) {
        const state = getPaneState(paneId);
        if (!state) { return 800; }

        if (state.image_mode) {
            const contentEl = document.getElementById("content_" + paneId);
            const imageEl = document.getElementById("image_display_" + paneId);
            const sliderEl = document.getElementById("scale-slider_" + paneId);

            if (!contentEl || !imageEl || !imageEl.naturalWidth || !imageEl.naturalHeight) {
                return 800;
            }

            const contentStyles = window.getComputedStyle(contentEl);
            const paddingY = parseFloat(contentStyles.paddingTop || 0) + parseFloat(contentStyles.paddingBottom || 0);
            const contentHeight = Math.max(1, contentEl.clientHeight - paddingY);
            const zoom = sliderEl ? (parseInt(sliderEl.value, 10) / 100) : 1;

            const fittedImageWidth = (imageEl.naturalWidth / imageEl.naturalHeight) * contentHeight * zoom;
            return Math.ceil(fittedImageWidth + getPaneChromeWidth(paneId));
        }

        if (state.pane_kind === "docx") {
            return 900;
        }

        if (state.pane_kind === "text") {
            return 760;
        }

        if (state.pane_kind === "audio") {
            return 420;
        }

        return 800;
    }

    function layoutRowPanes(rowEl) {
        if (!rowEl) { return; }

        const paneEls = Array.from(rowEl.querySelectorAll(".viewer-pane"));
        if (!paneEls.length) { return; }

        const rowStyle = window.getComputedStyle(rowEl);
        const gap = parseFloat(rowStyle.columnGap || rowStyle.gap || 0) || 0;
        const totalGap = gap * Math.max(0, paneEls.length - 1);
        const availableWidth = Math.max(100, rowEl.clientWidth - totalGap);

        const idealWidths = paneEls.map((paneEl) => {
            const paneId = paneEl.dataset.paneid;
            return getIdealPaneWidth(paneId);
        });

        const totalIdealWidth = idealWidths.reduce((sum, width) => sum + width, 0);
        const shrinkRatio = totalIdealWidth > availableWidth ? (availableWidth / totalIdealWidth) : 1;

        paneEls.forEach((paneEl, index) => {
            const paneId = paneEl.dataset.paneid;
            const state = getPaneState(paneId);
            let minWidth = 120;

            if (state) {
                if (state.pane_kind === "text") { minWidth = 260; }
                else if (state.pane_kind === "docx") { minWidth = 320; }
                else if (state.pane_kind === "audio") { minWidth = 260; }
            }

            const targetWidth = Math.max(minWidth, Math.floor(idealWidths[index] * shrinkRatio));
            paneEl.style.width = targetWidth + "px";
            paneEl.style.minWidth = "0";
            paneEl.style.maxWidth = targetWidth + "px";
            paneEl.style.flexBasis = targetWidth + "px";
        });
    }

    function layoutAllRows() {
        document.querySelectorAll(".pane-row").forEach((rowEl) => {
            layoutRowPanes(rowEl);
        });
        scaleAllDocxPanes();
    }

    function updatePaneImageScale(paneId) {
        const sliderEl = $("#scale-slider_" + paneId);
        const imageEl = $("#image_display_" + paneId);
        const contentEl = $("#content_" + paneId);
        const stageEl = $("#image_stage_" + paneId);

        if (!sliderEl.length || !imageEl.length || !contentEl.length || !stageEl.length) { return; }

        const baseFit = getPaneImageBaseFit(paneId);
        if (!baseFit) { return; }

        const scale = parseInt(sliderEl.val(), 10) / 100;
        const scaledWidth = baseFit.width * scale;
        const scaledHeight = baseFit.height * scale;

        imageEl.css({
            "width": scaledWidth + "px",
            "height": scaledHeight + "px",
            "max-width": "none",
            "max-height": "none"
        });

        stageEl.css({
            "width": Math.max(baseFit.contentWidth, scaledWidth) + "px",
            "height": Math.max(baseFit.contentHeight, scaledHeight) + "px",
            "min-width": Math.max(baseFit.contentWidth, scaledWidth) + "px",
            "min-height": Math.max(baseFit.contentHeight, scaledHeight) + "px"
        });
    }

    function updateAllPaneImageScales() {
        layoutAllRows();

        Object.keys(paneStates).forEach((paneId) => {
            const state = getPaneState(paneId);
            if (state && state.image_mode) {
                updatePaneImageScale(paneId);
            }
        });
    }

    function sliderPane(paneId, slider_value){
        const sliderEl = $("#scale-slider_" + paneId);
        const imageEl = $("#image_display_" + paneId);

        if (!imageEl.length) { return; }

        let scale;

        if ((typeof slider_value) == "number" && slider_value !== 0) {
            scale = parseInt(sliderEl.val(), 10) + slider_value;
            const min = parseInt(sliderEl.attr("min"), 10);
            const max = parseInt(sliderEl.attr("max"), 10);

            if (scale < min) {
                scale = min;
            }
            if (scale > max) {
                scale = max;
            }
            sliderEl.val(scale);
        }

        updateAllPaneImageScales();
    }


    $(document).ready(function () {
        createRow(true);
        setCompactRows(true);
        // recalculateCompactRowHeights();

        $("#sidebarAddPaneBtn").on("click", function () {
            addPane(activeRowId);
        });

        $("#sidebarAddRowBtn").on("click", function () {
            createRow(true);
        });

        $("#compactRowsToggle").on("change", function () {
            setCompactRows($(this).is(":checked"));
        });

        $("#paneMenuToggle").on("click", function () {
            $("#pane_menu_body").slideToggle(120);
        });

        $(document).on("click", ".viewer-pane", function (e) {
            if ($(e.target).closest(".pane-close, .pane-fullscreen, .zoom-control, .pane-scale-slider, .btn, audio, textarea, input").length) {
                return;
            }
            setActivePane($(this).data("paneid"));
        });

        $(document).on("click", ".pane-close", function (e) {
            e.stopPropagation();
            removePane($(this).data("paneid"));
        });

        $(document).on("click", ".pane-fullscreen", function (e) {
            e.stopPropagation();
            togglePaneFullscreen($(this).data("paneid"));
        });

        $(document).on("dblclick", ".viewer-pane", function (e) {
            if ($(e.target).closest(".pane-close, .pane-fullscreen, .zoom-control, .pane-scale-slider, .btn, audio, textarea, input").length) {
                return;
            }
            const paneId = $(this).data("paneid");
            togglePaneFullscreen(paneId);
        });

        $(document).on("click", ".pane-menu-main", function (e) {
            e.stopPropagation();
            const paneId = $(this).data("paneid");
            setActivePane(paneId);
            const paneEl = document.getElementById("pane_" + paneId);
            if (paneEl) {
                paneEl.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
            }
        });

        $(document).on("click", ".pane-menu-remove", function (e) {
            e.stopPropagation();
            removePane($(this).data("paneid"));
        });

        $(document).on("click", "[id^='editBtn_']", function (e) {
            e.stopPropagation();
            editMode(this.id.replace("editBtn_", ""));
        });

        $(document).on("click", "[id^='saveBtn_']", function (e) {
            e.stopPropagation();
            saveBtn(this.id.replace("saveBtn_", ""));
        });

        $(document).on("click", "[id^='cancelBtn_']", function (e) {
            e.stopPropagation();
            cancelBtn(this.id.replace("cancelBtn_", ""));
        });

        $(document).on("click", ".zoom-control", function (e) {
            e.stopPropagation();
            sliderPane($(this).data("paneid"), parseInt($(this).data("step"), 10));
        });

        $(document).on("input change", ".pane-scale-slider", function () {
            sliderPane(this.id.replace("scale-slider_", ""), 0);
        });

        $(window).on("resize", function () {
            recalculateCompactRowHeights();
            updateAllPaneImageScales();
            scaleAllDocxPanes();
        });

        // $(document).on("click", ".pane-content.sidebar_toggle", function () {
        //     const paneId = this.id.replace("content_", "");
        //     const state = getPaneState(paneId);
        //     if (state && !state.image_mode) {
        //         toggleSidebar();
        //     }
        // });

        $("#md_file").change(function(){
            file_layout = {
                type : "root",
                children: {}
            };

            rootFolderTitle = "Sammie's Notebook";
            setPageTitle(null, true);
            setSidebarIcon(null);
            setChromeFriendlyFavicon(null, "image/png");
            selectedFiles = this.files;

            for (let i = 0; i < selectedFiles.length; i++) {
                applyRootIconToSidebarAndFavicon(selectedFiles[i]);
            }

            function sortDirectory(file_path, parent_folder, fileIndex) {
                const indexOfDelimiter = file_path.indexOf("/");
                if (indexOfDelimiter !== -1) {
                    let folder_name = file_path.substring(0, indexOfDelimiter);

                    if (parent_folder.type == "root" && $("#" + cleanString(folder_name)).html() == null) {
                        $("#root_folder").text(folder_name);
                        rootFolderTitle = folder_name || "Sammie's Notebook";
                        setPageTitle(null, true);
                    }

                    let trimmed_path = file_path.substring(indexOfDelimiter+1);

                    if (parent_folder == null) {
                        file_layout.children[folder_name] = {
                            name: folder_name,
                            type: "folder",
                            children: {}
                        };
                        sortDirectory(trimmed_path, file_layout.children[folder_name], fileIndex);
                    } else {
                        if (!Object.keys(parent_folder.children).includes(folder_name)){
                            parent_folder.children[folder_name] = {
                                name: folder_name,
                                type: "folder",
                                children: {}
                            };
                        }
                        sortDirectory(trimmed_path, parent_folder.children[folder_name], fileIndex);
                    }
                } else {
                    parent_folder.children[file_path] = {
                        name: file_path,
                        type: "file",
                        file_id: fileIndex,
                        content: selectedFiles[fileIndex],
                        relative_path: selectedFiles[fileIndex].webkitRelativePath || file_path
                    };
                }
            }

            function displayDirectory(file, parentUlId, pathKey) {
                const children = file.children ?? {};
                const objKeys = Object.keys(children);

                for (let i = 0; i < objKeys.length; i++) {
                    const subFile = children[objKeys[i]];
                    const childPathKey = pathKey + "/" + subFile.name;

                    if (subFile.type === "file") {
                        const fileId = "f__" + idFromPath(childPathKey);

                        $("#" + parentUlId).append(
                            "<li class='file_item' data-fileid='" + subFile.file_id + "' id='" + fileId + "'>" +
                            subFile.name +
                            "</li>"
                        );

                    } else if (subFile.type === "folder") {
                        const folderUlId = "d__" + idFromPath(childPathKey);

                        $("#" + parentUlId).append(
                            "<li class='folderitem'>" +
                            "<div style='background-color:#1f1f1f !important; color:var(--accent-primary);' class='folder-label'><b>" +
                                subFile.name +
                            "</b></div>" +
                            "<ul class='folder-children' id='" + folderUlId + "'></ul>" +
                            "</li>"
                        );

                        displayDirectory(subFile, folderUlId, childPathKey);
                    }
                }
            }

            for (let i = 0; i < selectedFiles.length; i++) {
                sortDirectory(selectedFiles[i].webkitRelativePath || selectedFiles[i].name, file_layout, i);
            };

            $("#file_list_div ul").remove();
            $("#root_folder").after("<ul id='tree_root'></ul>");

            displayDirectory(file_layout, "tree_root", "root");

            $(".folder-children").hide();
            $("#tree_root").find("> li > .folder-children").show();
            $(".folder-children:visible").siblings(".folder-label").addClass("expanded");

            $(".file_item").on("mouseover", function(){
                underlineText(this);
            });
            $(".file_item").on("mouseleave", function(){
                underlineText(this);
            });

            if (selectedFiles.length > 0) {
                loadMarkdownFile(selectedFiles[0], activePaneId);
            }
        });

        $(document).on("click", ".file_item", function (event) {
            const id = $(this).data("fileid");
            let targetPaneId = activePaneId;

            if (event.shiftKey) {
                targetPaneId = chooseAlternatePane();
            }

            setActivePane(targetPaneId);
            loadMarkdownFile(selectedFiles[id], targetPaneId);
        });

        $(document).on("click", ".folder-label", function (e) {
            e.stopPropagation();

            const $children = $(this).siblings(".folder-children");
            const isOpen = $children.is(":visible");

            $children.toggle(!isOpen);
            $(this).toggleClass("expanded", !isOpen);
        });

        $(document).on("fullscreenchange webkitfullscreenchange", function () {
            const fullscreenEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (!fullscreenEl) {
                currentFullscreenPaneId = null;
            } else if (fullscreenEl.classList && fullscreenEl.classList.contains("viewer-pane")) {
                currentFullscreenPaneId = fullscreenEl.dataset.paneid || null;
            }
            recalculateCompactRowHeights();
            setTimeout(updateAllPaneImageScales, 0);
        });

        $(document).on("keydown", function (e) {
            const targetTag = (e.target && e.target.tagName ? e.target.tagName.toLowerCase() : "");
            const isTypingTarget = targetTag === "input" || targetTag === "textarea" || e.target?.isContentEditable;

            if (e.key === "Escape") {
                const fullscreenEl = document.fullscreenElement || document.webkitFullscreenElement;
                if (fullscreenEl) {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                } else if ($("body").hasClass("gui-hidden")) {
                    toggleGUIVisibility(false);
                }
            }

            if (!isTypingTarget && (e.key === "h" || e.key === "H")) {
                e.preventDefault();
                toggleGUIVisibility();
            }

            if (!isTypingTarget && (e.key === "f" || e.key === "F")) {
                e.preventDefault();
                toggleAppFullscreen();
            }
        });

        let cursorTimeout;
        const CURSOR_HIDE_DELAY = 3000; // 3 seconds

        function getCursorRoots() {
            const roots = [document.documentElement, document.body];
            const fullscreenEl = document.fullscreenElement || document.webkitFullscreenElement;
            if (fullscreenEl) {
                roots.push(fullscreenEl);
            }
            return roots.filter(Boolean);
        }

        function showCursor() {
            getCursorRoots().forEach((root) => {
                if (root.classList) {
                    root.classList.remove("hide-cursor");
                }
            });
        }

        function hideCursor() {
            getCursorRoots().forEach((root) => {
                if (root.classList) {
                    root.classList.add("hide-cursor");
                }
            });
        }

        function resetCursorTimer() {
            showCursor();
            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(hideCursor, CURSOR_HIDE_DELAY);
        }

        // Detect activity
        $(document).on("mousemove keydown mousedown scroll touchstart pointermove wheel", function () {
            resetCursorTimer();
        });

        document.addEventListener("fullscreenchange", resetCursorTimer);
        document.addEventListener("webkitfullscreenchange", resetCursorTimer);

        // Initialize on load
        resetCursorTimer();

});

</script>
